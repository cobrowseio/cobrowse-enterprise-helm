suite: proxy service
templates:
  - templates/proxy-service.yaml
tests:
  - it: exposes the proxy service
    template: templates/proxy-service.yaml
    asserts:
      - equal:
          path: spec.selector.component
          value: "proxy"
      - lengthEqual:
          path: spec.ports
          count: 1
      - contains:
          path: spec.ports
          content:
            port: 8080
            targetPort: 8080
            protocol: "TCP"

  - it: does not configure a GCE load balancer outside of GCP
    template: templates/proxy-service.yaml
    asserts:
      - notExists:
          path: metadata.annotations["cloud.google.com/neg"]

  - it: configures a default GCE load balancer in GCP
    template: templates/proxy-service.yaml
    set:
      ingress:
        class: "gce"
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            cloud.google.com/neg: '{"ingress": true}'

  - it: supports custom annotations
    template: templates/proxy-service.yaml
    set:
      proxy:
        service:
          annotations:
            cloud.google.com/backend-config: '{"ports": {"8080":"proxy-backendconfig"}}'
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            cloud.google.com/backend-config: '{"ports": {"8080":"proxy-backendconfig"}}'

  - it: merges custom annotations with the cloud provider defaults
    template: templates/proxy-service.yaml
    set:
      ingress:
        class: "gce"
      proxy:
        service:
          annotations:
            cloud.google.com/backend-config: '{"ports": {"8080":"proxy-backendconfig"}}'
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            cloud.google.com/neg: '{"ingress": true}'
            cloud.google.com/backend-config: '{"ports": {"8080":"proxy-backendconfig"}}'

  - it: prioritises custom annotations over provider defaults
    template: templates/proxy-service.yaml
    set:
      ingress:
        class: "gce"
      proxy:
        service:
          annotations:
            cloud.google.com/neg: '{"ingress": false}'
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            cloud.google.com/neg: '{"ingress": false}'

