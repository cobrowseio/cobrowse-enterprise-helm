apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-sdk-js
  namespace: {{ .Release.Namespace | default "default" }}
  labels:
    component: sdk-js
    app: {{ template "fullname" . }}
    chart: {{ template "chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    stage: {{ .Values.stage | quote }}
  {{- range $key, $value := .Values.sdkJs.labels }}
    {{ $key }}: {{ $value | quote }}
  {{- end }}
spec:
  replicas: {{ .Values.sdkJs.replicas | default "0" }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 50%
      maxUnavailable: 0
  minReadySeconds: 30
  selector:
    matchLabels:
      component: sdk-js
      stage: {{ .Values.stage | quote }}
  template:
    metadata:
      annotations:
    {{- if .Values.sdkJs.pod }}
      {{- range $key, $value := .Values.sdkJs.pod.annotations }}
        {{ $key }}: {{ $value | quote }}
      {{- end }}
    {{- end }}
      labels:
        app: {{ template "fullname" . }}
        component: sdk-js
        stage: {{ .Values.stage | quote }}
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            component: sdk-js
    {{- if .Values.sdkJs.nodeSelector}}
      nodeSelector:{{ toYaml .Values.sdkJs.nodeSelector | nindent 8 }}
    {{- end }}
      containers:
      - image: {{ (.Values.sdkJs.image).ref | default (include "image" (dict "repo" .Values.image.repo "image" "cobrowse-sdk-js-enterprise:3.25.2" )) }}
        {{- if (.Values.sdkJs.image).pullPolicy }}
        imagePullPolicy: {{ (.Values.sdkJs.image).pullPolicy }}
        {{- end}}
        livenessProbe:
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 30
          successThreshold: 1
          tcpSocket:
            port: 8080
          timeoutSeconds: 1
        name: sdk-js
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 30
          successThreshold: 1
          tcpSocket:
            port: 8080
          timeoutSeconds: 1
        volumeMounts:
        - mountPath: "/tmp"
          name: tmp
        resources:
          limits:
            cpu: {{ coalesce .Values.sdkJs.limits.cpu .Values.sdkJs.cpu "250m"}}
            memory: {{ coalesce .Values.sdkJs.limits.memory .Values.sdkJs.memory "512Mi"}}
          requests:
            cpu: {{ .Values.sdkJs.cpu | default "250m"}}
            memory: {{ .Values.sdkJs.memory | default "512Mi"}}
        {{- if .Values.containerSecurityContext.enabled }}
        securityContext:{{ include "defaultSecurityContext" . | nindent 10 }}
          runAsGroup: {{ (.Values.sdkJs.runAs).group | default "1000" }}
          runAsUser: {{ (.Values.sdkJs.runAs).user | default "1000" }}
        {{- end }}
      imagePullSecrets:
      - name: {{ .Release.Name }}-docker-cfg
      volumes:
      - name: tmp
        emptyDir:
          medium: Memory
      serviceAccountName: {{ .Values.serviceAccountName | default "" }}
      automountServiceAccountToken: false
