apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend-svc
  namespace: {{ .Release.Namespace | default "default" }}
  labels:
    app: {{ template "fullname" . }}
    chart: {{ template "chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    stage: {{ .Values.stage | quote }}
  {{- $default_annotations := dict }}
  {{- if eq .Values.ingress.class "gce" }}
  {{- $_ := set $default_annotations "cloud.google.com/neg" "{\"ingress\": true}" }}
  {{- end }}
  {{- template "service.annotations" (dict "annotations" .Values.frontend.service.annotations "default" $default_annotations) }}
spec:
  ports:
  - port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    component: frontend
    stage: {{ .Values.stage | quote }}
  type: {{ .Values.frontend.service.type | default "ClusterIP" }}
